{% extends 'blog/base.html' %}

{% block inhoud %}

<article class="post">

    {% if post.published_date %}
    <time class="date d-block mb-2">
        {{ post.published_date }}
    </time>
    {% endif %}

    <h2>{{ post.title }}</h2>

    <p>{{ post.text|linebreaksbr }}</p>

</article>

{% endblock %}
